<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #F5EDD8; display: flex; justify-content: center; padding: 0; }
  .post-container { background: #F5EDD8; width: 900px; padding: 64px 72px 56px; }
  h1 { font-family: 'Space Mono', monospace; font-size: 40px; font-weight: 700; color: #111; line-height: 1.2; margin-bottom: 14px; }
  .subtitle { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 400; color: #666; line-height: 1.7; max-width: 620px; }
  .divider { width: 100%; height: 1.5px; background: rgba(0,0,0,0.11); margin: 28px 0; }
  .meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .legend { display: flex; gap: 32px; }
  .legend-item { display: flex; align-items: center; gap: 10px; font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 400; color: #333; }
  .legend-dot { width: 18px; height: 18px; border-radius: 4px; flex-shrink: 0; }
  .chart-label { font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; color: #777; letter-spacing: 0.08em; text-transform: uppercase; }
  .chart-wrap { position: relative; width: 100%; height: 500px; }
  .branding { text-align: center; font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; color: #333; margin-top: 44px; }
</style>
</head>
<body>
<div class="post-container">

  <h1>Inside the AI Race</h1>
  <div class="subtitle">Department breakdown — % of visible workforce at each company</div>

  <div class="divider"></div>

  <div class="meta-row">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#CC785C;"></div>Anthropic</div>
      <div class="legend-item"><div class="legend-dot" style="background:#0D9268;"></div>OpenAI</div>
    </div>
    <div class="chart-label">% of employees by department</div>
  </div>

  <div class="chart-wrap"><canvas id="chart"></canvas></div>

  <div class="branding">Mindcase Insights</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<script>
Chart.register(ChartDataLabels);

const depts = ['Sales & GTM', 'Research & Technical'];
const ant   = [28.1, 10.3];
const oai   = [11.7, 24.2];

new Chart(document.getElementById('chart'), {
  type: 'bar',
  data: {
    labels: depts,
    datasets: [
      {
        label: 'Anthropic',
        data: ant,
        backgroundColor: '#CC785C',
        hoverBackgroundColor: '#B5623E',
        borderRadius: { topLeft: 5, topRight: 5, bottomLeft: 0, bottomRight: 0 },
        borderSkipped: false,
        barPercentage: 1.0,
        categoryPercentage: 0.55,
      },
      {
        label: 'OpenAI',
        data: oai,
        backgroundColor: '#0D9268',
        hoverBackgroundColor: '#0A7A58',
        borderRadius: { topLeft: 5, topRight: 5, bottomLeft: 0, bottomRight: 0 },
        borderSkipped: false,
        barPercentage: 1.0,
        categoryPercentage: 0.55,
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: false,
    layout: { padding: { top: 36, left: 40, right: 40, bottom: 0 } },
    plugins: {
      legend: { display: false },
      tooltip: { enabled: false },
      datalabels: {
        anchor: 'end',
        align: 'end',
        offset: 4,
        font: { family: 'Space Mono, monospace', size: 13, weight: '700' },
        color: '#333',
        formatter: v => v.toFixed(1) + '%',
      }
    },
    scales: {
      x: {
        grid: { display: false },
        border: { display: false },
        ticks: {
          font: { family: 'Space Mono, monospace', size: 14, weight: '400' },
          color: '#444',
          maxRotation: 0,
          minRotation: 0,
          autoSkip: false,
          padding: 14,
        }
      },
      y: {
        grid: { color: 'rgba(0,0,0,0.055)', lineWidth: 1, drawTicks: false },
        border: { display: false },
        ticks: {
          font: { family: 'Space Mono, monospace', size: 12 },
          color: '#aaa',
          callback: v => v + '%',
          stepSize: 5,
          padding: 14,
        },
        max: 35,
      }
    }
  }
});
</script>
</body>
</html>
